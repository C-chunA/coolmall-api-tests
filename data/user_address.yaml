    payload:
      id: null
    expected:
      code: 500
      message: "ids 参数错误"

  - name: "删除收货地址-id不存在"
    endpoint: "/app/user/address/delete"
    method: "POST"
    payload:
      id: 999999
    expected:
      code: 500
      message: "ids 参数错误"

  - name: "删除收货地址-id为字符串"
    endpoint: "/app/user/address/delete"
    method: "POST"
    payload:
      id: "abc"
    expected:
      code: 500
      message: "ids 参数错误"

  - name: "删除收货地址-id为负数"
