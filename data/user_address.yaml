      phone: "13800138000"
      province: "江苏省"
      city: "南京市"
      district: "鼓楼区"
      address: "测试街道123号"
      isDefault: "true"
    expected:
      code: 1001

  - name: "添加收货地址-联系人超长"
    endpoint: "/app/user/address/add"
    method: "POST"
    payload:
      contact: "测试联系人测试联系人测试联系人测试联系人测试联系人测试联系人"
      phone: "13800138000"
