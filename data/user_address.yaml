  # ========== 格式错误测试 ==========
  - name: "添加收货地址-手机号10位"
    endpoint: "/app/user/address/add"
    method: "POST"
    payload:
      contact: "测试联系人"
      phone: "1380013800"
      province: "江苏省"
      city: "南京市"
      district: "鼓楼区"
      address: "测试街道123号"
      isDefault: false
    expected:
      code: 1001

  - name: "添加收货地址-手机号12位"
    endpoint: "/app/user/address/add"
    method: "POST"
    payload:
      contact: "测试联系人"
      phone: "138001380000"
      province: "江苏省"
      city: "南京市"
      district: "鼓楼区"
      address: "测试街道123号"
      isDefault: false
