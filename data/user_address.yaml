# 收货地址测试数据
test_cases:
  - name: "添加收货地址成功"
    endpoint: "/app/user/address/add"
    method: "POST"
    payload:
      contact: "测试联系人"
      phone: "13800138000"
      province: "江苏省"
      city: "南京市"
      district: "鼓楼区"
      address: "测试街道123号"
      isDefault: false
    expected:
      code: 1000
      message: "success"
      data_fields:
        - id

