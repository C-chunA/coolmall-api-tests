      message: "success"

  - name: "更新收货地址"
    endpoint: "/app/user/address/update"
    method: "POST"
    payload:
      id: 1
      contact: "更新后的联系人"
      phone: "13900139000"
      province: "江苏省"
      city: "南京市"
      district: "玄武区"
      address: "更新后的地址456号"
      isDefault: true
    expected:
      code: 1000
      message: "success"

  # ========== 删除收货地址 - 参数校验 ==========
  - name: "删除收货地址-缺少id"
    endpoint: "/app/user/address/delete"
    method: "POST"
    payload: {}
    expected:
      code: 500
      message: "ids 参数错误"

