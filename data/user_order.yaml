  # ========== 订单列表分页 ==========
  - name: "查询订单列表分页"
    endpoint: "/app/order/info/page"
    method: "POST"
    payload:
      page: 1
      size: 10
    expected:
      code: 1000
      message: "success"

  # ========== 订单详情查询 ==========
  - name: "查询订单详情"
    endpoint: "/app/order/info/info"
    method: "GET"
    payload:
      id: 14485
    expected:
      code: 1000
      message: "success"

  - name: "查询订单详情-订单不存在"
    endpoint: "/app/order/info/info"
    method: "GET"
    payload:
      id: 999999
    expected:
      code: 1000
      message: "success"

  # ========== 用户订单统计 ==========
  - name: "查询用户订单统计"
    endpoint: "/app/order/info/userCount"
    method: "GET"
    expected:
      code: 1000
      message: "success"

  # ========== 物流信息查询 ==========
  - name: "查询物流信息"
    endpoint: "/app/order/info/logistics"
    method: "GET"
    payload:
      orderId: 14485
    expected:
      code: 1000
      message: "success"

  - name: "查询物流信息-订单不存在"
    endpoint: "/app/order/info/logistics"
    method: "GET"
    payload:
      orderId: 999999
    expected:
      code: 1000
      message: "success"

  # ========== 确认收货 ==========
  - name: "确认收货-订单状态不允许"
    endpoint: "/app/order/info/confirm"
    method: "GET"
    payload:
      orderId: 14485
    expected:
      code: 500
      message: "订单状态不允许确认收货"

  - name: "确认收货-订单不存在"
    endpoint: "/app/order/info/confirm"
    method: "GET"
    payload:
      orderId: 999999
    expected:
      code: 500
      message: "订单不存在"
